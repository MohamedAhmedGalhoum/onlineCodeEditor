<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galhoum - Code Editor</title>
</head>
<body>
    <header>
        <div class="container row">
            <div class="brand">
                <div class="logo"></div>
                <div class="title">Galhoum Code Editor - Live Coding in the browser</div>
            </div>
             < class="row">
                <button class="btn secondary" id="saveBtn" title="Save Code locally"><span>Save</span></button>
                <button class="btn secondary" id="loadBtn" title="Load Code from local storage"><span>Load</span></button>
                <input id="openFile" type="file" accept="application/json" hidden>
             </div>
        </div>
    </header>
    <main>
        <aside class="card panel stack">
            <h2>Task || Assingment</h2>
            <textarea id="assignment" class="text" placeholder="write your Thoghts and Tasks here ...."></textarea>
            <div class="stack">
                <label for="textArea">Validation tests (JavaScript only - optional)</label>
                <textarea id="textArea" class="text" placeholder="Write simple tests to check the solution"></textarea>
            </div>
            <div class="muted">
                tip: <span class="kbd">Ctlr</span> + <span class="kbd">S</span> to save your code,
                <span class="kbd">Ctrl</span> + <span class="kbd">Enter</span> to run.
            </div>
        </aside>
    </main>
</body>
</html>
